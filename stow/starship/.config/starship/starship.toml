"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000

format = """
[в–‘в–’в–“в–Ҳ](#e3e5e5)\
$os\
$username\
[оӮ°](bg:#769ff0 fg:#e3e5e5)\
$directory\
[оӮ°](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оӮ°](fg:#394260 bg:#212736)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$swift\
[оӮ°](fg:#212736 bg:#1d2230)\
$time\
[оӮ°](fg:#1d2230)\
$line_break\
$character"""

[os]
disabled = false
style = "bg:#e3e5e5 fg:#090c0c"

[os.symbols]
Windows = "оңҸ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
AOSC = "пҢҒ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"

[username]
show_always = true
style_user = "bg:#e3e5e5 fg:#090c0c"
style_root = "bg:#e3e5e5 fg:#090c0c"
format = '[ $user]($style)'

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[java]
symbol = "оү–"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[kotlin]
symbol = "оҳҙ"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[haskell]
symbol = "оҳҹ"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:#212736"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:#769ff0 bg:#212736)]($style)'

[swift]
symbol = "оқ•"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[line_break]
disabled = true

[character]
disabled = true
