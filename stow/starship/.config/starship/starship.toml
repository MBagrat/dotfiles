"$schema" = 'https://starship.rs/config-schema.json'

format = """
[вЦСвЦТвЦУвЦИ](#e3e5e5)\
$os\
$username\
[оВ∞](bg:#769ff0 fg:#e3e5e5)\
$directory\
[оВ∞](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оВ∞](fg:#394260 bg:#212736)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$swift\
[оВ∞](fg:#212736 bg:#1d2230)\
$time\
[оВ∞](fg:#1d2230)\
$line_break\
$character"""

[os]
disabled = false
style = "bg:#e3e5e5 fg:#090c0c"

[os.symbols]
Windows = "оЬП"
Ubuntu = "у∞ХИ"
SUSE = "пМФ"
Raspbian = "у∞Рњ"
Mint = "у∞£≠"
Macos = "у∞Аµ"
Manjaro = "пМТ"
Linux = "у∞Мљ"
Gentoo = "у∞£®"
Fedora = "у∞£Ы"
Alpine = "пМА"
Amazon = "пЙ∞"
Android = "оЬО"
AOSC = "пМБ"
Arch = "у∞£З"
Artix = "у∞£З"
CentOS = "пМД"
Debian = "у∞£Ъ"
Redhat = "у±ДЫ"
RedHatEnterprise = "у±ДЫ"

[username]
show_always = true
style_user = "bg:#e3e5e5 fg:#090c0c"
style_root = "bg:#e3e5e5 fg:#090c0c"
format = '[ $user]($style)'

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[c]
symbol = "оШЮ "
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оШІ"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оШИ"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[java]
symbol = "оЙЦ"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[kotlin]
symbol = "оШі"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[haskell]
symbol = "оШЯ"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = "оШЖ"
style = "bg:#212736"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:#769ff0 bg:#212736)]($style)'

[swift]
symbol = "оЭХ"
style = "bg:#212736"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пРЇ $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[line_break]
disabled = true

[character]
disabled = true
