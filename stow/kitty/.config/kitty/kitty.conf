font_family              JetBrainsMono Nerd Font Mono
bold_font                JetBrainsMono Nerd Font Mono Bold
italic_font              JetBrainsMono Nerd Font Mono Italic
bold_italic_font         JetBrainsMono Nerd Font Mono Bold Italic
font_size 15
background_opacity 1

hide_window_decorations yes
window_border_width 0
draw_minimal_borders yes

macos_option_as_alt both
cursor_shape beam

tab_bar_edge bottom
tab_bar_align left
tab_bar_style powerline
tab_powerline_style angled
tab_bar_min_tabs 1
tab_activity_symbol none
bell_on_tab no
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
# Truncate titles over 30 chars; otherwise center with a narrower field for
# odd-length titles so the padding stays visually even on both sides
tab_title_template "{f'{title[:30]}…' if len(title) > 30 else (title.center(6) if len(title) % 2 == 0 else title.center(5))}"
active_tab_font_style   bold

# BEGIN_KITTY_THEME
# Tokyo Night
include themes/tokyo-night-theme.conf
# END_KITTY_THEME
